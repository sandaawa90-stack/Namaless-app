name: nameless_pressing
description: "AI-powered laundry and pressing platform for Cameroon"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  riverpod_generator: ^2.3.0

  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  cloud_firestore: ^4.14.0
  firebase_messaging: ^14.7.0
  firebase_storage: ^11.5.0

  # UI & Design
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  lottie: ^2.7.0
  smooth_page_indicator: ^1.1.0

  # Navigation & Routing
  go_router: ^12.0.0
  auto_route: ^7.8.0

  # Utilities
  get_it: ^7.6.0
  intl: ^0.19.0
  uuid: ^4.0.0
  connectivity_plus: ^5.0.0
  permission_handler: ^11.4.0
  geolocator: ^9.0.0
  google_maps_flutter: ^2.5.0
  http: ^1.1.0
  dio: ^5.3.0

  # Data & Storage
  shared_preferences: ^2.2.0
  hive: ^2.2.0
  hive_flutter: ^1.1.0
  json_serializable: ^6.7.0

  # Notifications
  awesome_notifications: ^0.9.0

  # Analytics
  firebase_analytics: ^10.7.0

  # Dev Tools
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0
  json_serializable: ^6.7.0
  auto_route_generator: ^7.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - .env
